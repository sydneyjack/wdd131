<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Product Review Form Assignment for WDD 131">
    <meta name="author" content="Sydney Sobomabo">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form method="get" action="review.html">

            <div class="form-group">
                <label for="productName">Product Name <span>*</span></label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Overall Rating <span>*</span></label>
                <div class="rating">
                    <label><input type="radio" name="rating" id="star1" value="1" required> ☆</label>
                    <label><input type="radio" name="rating" id="star2" value="2"> ☆☆</label>
                    <label><input type="radio" name="rating" id="star3" value="3"> ☆☆☆</label>
                    <label><input type="radio" name="rating" id="star4" value="4"> ☆☆☆☆</label>
                    <label><input type="radio" name="rating" id="star5" value="5"> ☆☆☆☆☆</label>
                </div>
            </div>

            <div class="form-group">
                <label for="installDate">Date of Installation <span>*</span></label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <div class="form-group">
                <label>Which features did you find useful? <br>(Check all that apply)</label>

                <label><input type="checkbox" id="durability" name="features" value="Durability"> Durability</label>

                <label><input type="checkbox" id="ease" name="features" value="Ease of Use"> Ease of Use</label>

                <label><input type="checkbox" id="performance" name="features" value="Performance"> Performance</label>

                <label><input type="checkbox" id="design" name="features" value="Design"> Design</label>
            </div>

            <div class="form-group">
                <label for="review">Written Review (Optional)</label>
                <textarea id="review" name="review" rows="5"></textarea>
            </div>

            <div class="form-group">
                <label for="username">Your Name (Optional)</label>
                <input type="text" id="username" name="username">
            </div>

            <input type="submit" value="Submit Review" class="submit-btn">

        </form>
    </main>

    <footer>
        <p>© <span id="currentyear"></span> 🌍 Sydney Sobomabo 🌍 Nigeria</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
